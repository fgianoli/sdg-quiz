<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SDG 15.3.1 QUIZ — Admin</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;600;700;900&display=swap');
  :root{--bg:#0a0a1a;--card:#12122a;--teal:#00e5ff;--orange:#ff6b35;--green:#00ff87;--red:#ff3860;--purple:#a855f7;--gold:#ffd700;--text:#e0e0ff;--dim:#667}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

  .header{background:linear-gradient(135deg,#0f0f2e,#1a1a3e);border-bottom:2px solid var(--teal);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
  .header h1{font-family:'Orbitron',sans-serif;font-size:1.3em;background:linear-gradient(90deg,var(--teal),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .header .phase-badge{padding:6px 16px;border-radius:20px;font-size:.8em;font-weight:700;text-transform:uppercase;letter-spacing:1px}
  .phase-lobby{background:rgba(0,229,255,.15);color:var(--teal);border:1px solid var(--teal)}
  .phase-buzzing{background:rgba(0,255,135,.15);color:var(--green);border:1px solid var(--green);animation:pulseBorder 1s infinite}
  .phase-answering{background:rgba(255,107,53,.15);color:var(--orange);border:1px solid var(--orange)}
  .phase-reveal{background:rgba(168,85,247,.15);color:var(--purple);border:1px solid var(--purple)}
  .phase-finished{background:rgba(255,215,0,.15);color:var(--gold);border:1px solid var(--gold)}
  @keyframes pulseBorder{0%,100%{box-shadow:0 0 5px rgba(0,255,135,.3)}50%{box-shadow:0 0 20px rgba(0,255,135,.6)}}

  .lang-bar{display:flex;gap:8px;align-items:center}
  .lang-bar label{font-size:.75em;color:var(--dim);text-transform:uppercase;letter-spacing:1px}
  .lang-bar select{background:var(--card);color:var(--text);border:1px solid #333;border-radius:8px;padding:4px 10px;font-size:.85em;cursor:pointer}

  .main{display:grid;grid-template-columns:1fr 320px;gap:16px;padding:16px;height:calc(100vh - 56px)}
  .left-panel{display:flex;flex-direction:column;gap:16px;overflow:auto}
  .right-panel{display:flex;flex-direction:column;gap:16px;overflow:auto}

  .card{background:var(--card);border:1px solid #222;border-radius:16px;padding:20px;position:relative;overflow:hidden}
  .card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--teal),var(--purple))}
  .card h3{font-family:'Orbitron',sans-serif;font-size:.75em;text-transform:uppercase;letter-spacing:2px;color:var(--dim);margin-bottom:12px}

  .q-display{flex:1}
  .q-number{font-family:'Orbitron',sans-serif;font-size:3em;font-weight:900;background:linear-gradient(135deg,var(--teal),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
  .q-category{display:inline-block;padding:4px 12px;border-radius:12px;font-size:.7em;font-weight:700;background:rgba(168,85,247,.2);color:var(--purple);border:1px solid rgba(168,85,247,.3);margin:8px 0}
  .q-text{font-size:1.3em;font-weight:700;line-height:1.4;margin:12px 0}
  .q-text-secondary{font-size:1em;color:var(--dim);font-style:italic;margin-bottom:16px}
  .q-options{list-style:none;display:grid;gap:8px}
  .q-option{padding:12px 16px;border-radius:12px;border:2px solid #333;font-size:1em;display:flex;align-items:center;gap:10px;transition:all .2s}
  .q-option .letter{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;font-family:'Orbitron',sans-serif;font-size:.85em;background:rgba(255,255,255,.05);flex-shrink:0}
  .q-option.correct-highlight{border-color:var(--green);background:rgba(0,255,135,.08)}
  .q-option.correct-highlight .letter{background:var(--green);color:var(--bg)}
  .q-points{font-size:.85em;color:var(--orange);font-weight:700;margin-top:8px}
  .q-explanation{margin-top:12px;padding:12px;border-radius:10px;background:rgba(0,229,255,.05);border:1px solid rgba(0,229,255,.15);font-size:.85em;color:var(--dim);line-height:1.5}

  /* ANSWERING TEAM BANNER */
  .answering-banner{padding:12px 16px;border-radius:12px;margin-bottom:12px;display:flex;align-items:center;gap:12px;font-weight:700;font-size:1.1em;animation:glowBanner 2s infinite}
  .answering-banner .team-dot{width:16px;height:16px;border-radius:50%;flex-shrink:0}
  @keyframes glowBanner{0%,100%{box-shadow:0 0 5px rgba(255,215,0,.1)}50%{box-shadow:0 0 20px rgba(255,215,0,.3)}}

  .buzz-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;margin-bottom:6px;background:rgba(255,255,255,.03);border:1px solid #222;transition:all .3s}
  .buzz-item.first{border-color:var(--gold);background:rgba(255,215,0,.08);animation:glowGold 2s infinite}
  .buzz-item.eliminated{opacity:.4;text-decoration:line-through}
  @keyframes glowGold{0%,100%{box-shadow:0 0 5px rgba(255,215,0,.1)}50%{box-shadow:0 0 15px rgba(255,215,0,.3)}}
  .buzz-rank{font-family:'Orbitron',sans-serif;font-weight:900;font-size:1.2em;width:32px;text-align:center}
  .buzz-rank.r1{color:var(--gold)}
  .buzz-rank.r2{color:#c0c0c0}
  .buzz-rank.r3{color:#cd7f32}
  .buzz-name{flex:1;font-weight:600}
  .buzz-time{font-family:'Orbitron',sans-serif;font-size:.75em;color:var(--dim)}
  .buzz-color{width:12px;height:12px;border-radius:50%;flex-shrink:0}
  .buzz-counter{text-align:center;padding:6px;font-size:.75em;color:var(--dim);font-family:'Orbitron',sans-serif;letter-spacing:1px;border-bottom:1px solid #222;margin-bottom:8px}

  .controls{display:flex;flex-wrap:wrap;gap:8px}
  .btn{padding:12px 20px;border-radius:12px;border:none;font-weight:700;font-size:.9em;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;text-transform:uppercase;letter-spacing:1px}
  .btn:active{transform:scale(.96)}
  .btn-start{background:linear-gradient(135deg,var(--green),#00cc6a);color:var(--bg);flex:1}
  .btn-correct{background:linear-gradient(135deg,var(--green),#00cc6a);color:var(--bg)}
  .btn-wrong{background:linear-gradient(135deg,var(--red),#cc2040);color:#fff}
  .btn-next{background:linear-gradient(135deg,var(--teal),#0099cc);color:var(--bg);flex:1}
  .btn-skip{background:rgba(255,255,255,.08);color:var(--dim);border:1px solid #333}
  .btn-reset{background:rgba(255,56,96,.1);color:var(--red);border:1px solid rgba(255,56,96,.3)}
  .btn:disabled{opacity:.3;cursor:not-allowed;transform:none}

  .lb-entry{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:10px;margin-bottom:4px;background:rgba(255,255,255,.02);transition:all .3s}
  .lb-pos{font-family:'Orbitron',sans-serif;font-weight:900;width:28px;text-align:center;font-size:.85em}
  .lb-pos.p1{color:var(--gold)}
  .lb-pos.p2{color:#c0c0c0}
  .lb-pos.p3{color:#cd7f32}
  .lb-color{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .lb-name{flex:1;font-weight:600;font-size:.85em}
  .lb-score{font-family:'Orbitron',sans-serif;font-weight:700;font-size:.9em;color:var(--teal)}
  .lb-connected{width:6px;height:6px;border-radius:50%;flex-shrink:0}
  .lb-connected.online{background:var(--green)}
  .lb-connected.offline{background:var(--red)}

  .lobby-view{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px}
  .lobby-icon{font-size:5em;margin-bottom:16px;animation:float 3s ease-in-out infinite}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  .lobby-title{font-family:'Orbitron',sans-serif;font-size:2em;font-weight:900;background:linear-gradient(90deg,var(--teal),var(--green),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
  .lobby-sub{color:var(--dim);margin-bottom:24px}
  .team-count{font-family:'Orbitron',sans-serif;font-size:3em;font-weight:900;color:var(--teal)}
  .team-count-label{font-size:.85em;color:var(--dim);margin-bottom:24px}

  .podium{display:flex;align-items:flex-end;justify-content:center;gap:12px;padding:20px}
  .podium-spot{text-align:center;border-radius:12px 12px 0 0;padding:12px 16px;min-width:80px}
  .podium-spot.first{background:linear-gradient(180deg,rgba(255,215,0,.2),rgba(255,215,0,.05));height:160px;border:1px solid rgba(255,215,0,.3)}
  .podium-spot.second{background:linear-gradient(180deg,rgba(192,192,192,.2),rgba(192,192,192,.05));height:120px;border:1px solid rgba(192,192,192,.3)}
  .podium-spot.third{background:linear-gradient(180deg,rgba(205,127,50,.2),rgba(205,127,50,.05));height:90px;border:1px solid rgba(205,127,50,.3)}
  .podium-trophy{font-size:2em}
  .podium-name{font-weight:700;font-size:.85em;margin-top:4px}
  .podium-score{font-family:'Orbitron',sans-serif;font-size:.75em;color:var(--dim)}

  .countdown-overlay{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.9);z-index:100}
  .countdown-num{font-family:'Orbitron',sans-serif;font-size:12em;font-weight:900;background:linear-gradient(135deg,var(--teal),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:countPop .8s ease}
  @keyframes countPop{0%{transform:scale(2);opacity:0}50%{transform:scale(1);opacity:1}100%{transform:scale(.9);opacity:.8}}

  .hide{display:none!important}
  ::-webkit-scrollbar{width:6px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
</style>
</head>
<body>

<div class="header">
  <h1>SDG 15.3.1 QUIZ — ADMIN</h1>
  <div>
    <span class="phase-badge phase-lobby" id="phaseBadge">LOBBY</span>
  </div>
  <div style="font-size:.7em;color:var(--dim);letter-spacing:1px">EN + 🇷🇺 + 🇹🇷</div>
</div>

<div class="main">
  <div class="left-panel">
    <!-- LOBBY -->
    <div id="lobbyView" class="card lobby-view">
      <div class="lobby-icon">🌍</div>
      <div class="lobby-title">SDG 15.3.1 QUIZ</div>
      <div class="lobby-sub">UNCCD Regional Capacity Building Workshop</div>
      <div class="team-count" id="teamCount">0</div>
      <div class="team-count-label">teams connected</div>
      <button class="btn btn-start" id="startBtn" onclick="startGame()">START GAME</button>
    </div>

    <!-- ANSWERING BANNER -->
    <div id="answeringBanner" class="answering-banner hide" style="background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.3);border-radius:12px">
      <span class="team-dot" id="answeringDot"></span>
      <span id="answeringName"></span>
      <span style="color:var(--dim);font-weight:400;font-size:.8em;margin-left:auto">is answering...</span>
    </div>

    <!-- QUESTION -->
    <div id="questionView" class="card q-display hide">
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:8px">
        <div class="q-number" id="qNum">Q1</div>
        <div>
          <span class="q-category" id="qCat"></span>
          <div class="q-points" id="qPts"></div>
        </div>
      </div>
      <div class="q-text" id="qText"></div>
      <div class="q-text-secondary" id="qTextSecondary"></div>
      <ol class="q-options" id="qOptions"></ol>
      <div class="q-explanation hide" id="qExplanation"></div>
    </div>

    <!-- CONTROLS -->
    <div class="card" id="controlsCard">
      <h3>Controls</h3>
      <div class="controls" id="controlsArea"></div>
    </div>

    <!-- FINISHED -->
    <div id="finishedView" class="card hide">
      <h3>Final Results</h3>
      <div class="podium" id="podium"></div>
    </div>
  </div>

  <div class="right-panel">
    <div class="card" id="buzzCard">
      <h3>Buzz Order</h3>
      <div id="buzzCounter" class="buzz-counter hide"></div>
      <div id="buzzList" style="color:var(--dim);font-size:.85em">Waiting for buzzes...</div>
    </div>
    <div class="card" style="flex:1;overflow:auto">
      <h3>Leaderboard</h3>
      <div id="leaderboard"></div>
    </div>
  </div>
</div>

<div id="countdownOverlay" class="countdown-overlay hide">
  <div class="countdown-num" id="countdownNum"></div>
</div>

<!-- AUDIO -->
<audio id="sndBuzz" preload="auto"></audio>

<script>
// Sound effects via Web Audio API
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playTone(freq, dur, type='sine') {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.type = type; osc.frequency.value = freq;
  gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.start(); osc.stop(audioCtx.currentTime + dur);
}
function sndBuzz() { playTone(800, 0.15, 'square'); }
function sndCorrect() { playTone(523, 0.1); setTimeout(() => playTone(659, 0.1), 100); setTimeout(() => playTone(784, 0.2), 200); }
function sndWrong() { playTone(200, 0.3, 'sawtooth'); }
function sndNewQ() { playTone(440, 0.08); setTimeout(() => playTone(660, 0.12), 100); }

const WS_URL = (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host;
let ws;
let state = { phase: 'lobby', teams: [], buzzOrder: [], currentQ: -1, questions: [], totalQuestions: 0, secondLang: 'ru', currentQuestion: null, revealData: null };

function connect() {
  ws = new WebSocket(WS_URL);
  ws.onopen = () => { ws.send(JSON.stringify({ type: 'admin-join' })); };
  ws.onmessage = (e) => handleMsg(JSON.parse(e.data));
  ws.onclose = () => setTimeout(connect, 2000);
}

function handleMsg(msg) {
  switch(msg.type) {
    case 'admin-state':
      Object.assign(state, {
        teams: msg.teams || [], phase: msg.phase, currentQ: msg.currentQ,
        questions: msg.questions || [], buzzOrder: msg.buzzOrder || [],
        secondLang: msg.secondLang || 'ru', totalQuestions: msg.totalQuestions || 0
      });
      document.getElementById('langSelect').value = state.secondLang;
      renderAll();
      break;
    case 'game-started':
      state.phase = 'countdown';
      state.totalQuestions = msg.totalQuestions;
      renderPhase();
      break;
    case 'countdown':
      showCountdown(msg.seconds);
      break;
    case 'question':
      state.phase = 'buzzing';
      state.currentQ = msg.num - 1;
      state.buzzOrder = [];
      state.teams = msg.teams || state.teams;
      state.revealData = null;
      state.currentQuestion = { num: msg.num, total: msg.total, question: msg.question, options: msg.options, category: msg.category, points: msg.points };
      sndNewQ();
      renderAll();
      break;
    case 'buzz-update':
      state.buzzOrder = msg.buzzOrder;
      if (state.buzzOrder.length === 1) { state.phase = 'answering'; sndBuzz(); }
      renderBuzzOrder(msg.totalTeams, msg.buzzedCount);
      renderControls();
      renderPhase();
      renderAnsweringBanner();
      break;
    case 'first-buzz':
      state.phase = 'answering';
      state._answeringTeam = { name: msg.teamName, color: msg.teamColor };
      renderPhase();
      renderControls();
      renderAnsweringBanner();
      break;
    case 'wrong-pass':
      state.buzzOrder = msg.buzzOrder;
      state.phase = 'answering';
      state._answeringTeam = { name: msg.nextTeam, color: msg.nextColor };
      sndWrong();
      renderBuzzOrder();
      renderControls();
      renderPhase();
      renderAnsweringBanner();
      break;
    case 'all-wrong':
      state.phase = 'all-wrong';
      state.buzzOrder = [];
      state._answeringTeam = null;
      sndWrong();
      renderAll();
      break;
    case 'reveal':
      state.phase = 'reveal';
      state.teams = msg.teams || state.teams;
      state.revealData = { correct: msg.correct, explanation: msg.explanation, winnerName: msg.winnerName, isCorrect: msg.isCorrect };
      state._answeringTeam = null;
      if (msg.isCorrect) sndCorrect(); else sndWrong();
      renderAll();
      break;
    case 'finished':
      state.phase = 'finished';
      state.teams = msg.teams || state.teams;
      state._answeringTeam = null;
      renderAll();
      break;
    case 'reset':
      state.phase = 'lobby'; state.currentQ = -1; state.buzzOrder = [];
      state.teams.forEach(t => t.score = 0);
      state._answeringTeam = null; state.revealData = null; state.currentQuestion = null;
      renderAll();
      break;
    case 'teams-updated':
      state.teams = msg.teams || state.teams;
      renderLeaderboard();
      document.getElementById('teamCount').textContent = state.teams.length;
      break;
    case 'lang-changed':
      state.secondLang = msg.lang;
      document.getElementById('langSelect').value = msg.lang;
      break;
  }
}

function renderAll() {
  renderPhase(); renderQuestion(); renderBuzzOrder(); renderLeaderboard();
  renderControls(); renderLobby(); renderFinished(); renderAnsweringBanner();
}

function renderPhase() {
  const badge = document.getElementById('phaseBadge');
  const map = { lobby:'LOBBY', countdown:'COUNTDOWN', buzzing:'BUZZING', answering:'ANSWERING', reveal:'REVEAL', finished:'FINISHED', 'all-wrong':'ALL WRONG' };
  badge.textContent = map[state.phase] || state.phase.toUpperCase();
  const css = state.phase === 'countdown' ? 'buzzing' : state.phase === 'all-wrong' ? 'answering' : state.phase;
  badge.className = 'phase-badge phase-' + css;
}

function renderAnsweringBanner() {
  const el = document.getElementById('answeringBanner');
  if (state.phase === 'answering' && state._answeringTeam) {
    el.classList.remove('hide');
    document.getElementById('answeringDot').style.background = state._answeringTeam.color || '#666';
    document.getElementById('answeringName').textContent = state._answeringTeam.name;
  } else {
    el.classList.add('hide');
  }
}

function renderLobby() {
  const lv = document.getElementById('lobbyView'), qv = document.getElementById('questionView'), fv = document.getElementById('finishedView');
  if (state.phase === 'lobby') {
    lv.classList.remove('hide'); qv.classList.add('hide'); fv.classList.add('hide');
    document.getElementById('teamCount').textContent = state.teams.length;
    document.getElementById('startBtn').disabled = state.teams.length < 1;
  } else if (state.phase === 'finished') {
    lv.classList.add('hide'); qv.classList.add('hide'); fv.classList.remove('hide');
  } else {
    lv.classList.add('hide'); qv.classList.remove('hide'); fv.classList.add('hide');
  }
}

function renderQuestion() {
  if (!state.currentQuestion || state.phase === 'lobby' || state.phase === 'finished') return;
  const q = state.currentQuestion;
  document.getElementById('qNum').textContent = 'Q' + q.num;
  document.getElementById('qCat').textContent = q.category?.en || q.category || '';
  document.getElementById('qPts').textContent = q.points + ' points';
  document.getElementById('qText').textContent = q.question?.en || q.question || '';
  // Show BOTH Russian and Turkish under the English question
  const qRu = q.question?.ru || '';
  const qTr = q.question?.tr || '';
  let secondHtml = '';
  if (qRu) secondHtml += '<span style="color:#8899bb">🇷🇺 ' + qRu + '</span>';
  if (qTr) secondHtml += (qRu ? '<br>' : '') + '<span style="color:#8899bb">🇹🇷 ' + qTr + '</span>';
  document.getElementById('qTextSecondary').innerHTML = secondHtml;

  const letters = ['A','B','C','D'];
  const opts = q.options?.en || q.options || [];
  const optsRu = q.options?.ru || [];
  const optsTr = q.options?.tr || [];
  document.getElementById('qOptions').innerHTML = opts.map((o, i) => {
    const isCorrect = state.phase === 'reveal' && state.revealData && i === state.revealData.correct;
    let sub = '';
    if (optsRu[i]) sub += '<em style="color:#667;font-size:.8em">🇷🇺 ' + optsRu[i] + '</em>';
    if (optsTr[i]) sub += (optsRu[i] ? ' &nbsp;|&nbsp; ' : '') + '<em style="color:#667;font-size:.8em">🇹🇷 ' + optsTr[i] + '</em>';
    return `<li class="q-option ${isCorrect ? 'correct-highlight' : ''}">
      <span class="letter">${letters[i]}</span>
      <span>${o}${sub ? '<br>' + sub : ''}</span>
    </li>`;
  }).join('');

  const expEl = document.getElementById('qExplanation');
  if (state.phase === 'reveal' && state.revealData) {
    const exp = state.revealData.explanation;
    let html = '<strong>Answer:</strong> ' + letters[state.revealData.correct] + '<br>' + (exp?.en || exp || '');
    const expRu = exp?.ru || '';
    const expTr = exp?.tr || '';
    if (expRu) html += '<br><em style="color:#8899bb">🇷🇺 ' + expRu + '</em>';
    if (expTr) html += '<br><em style="color:#8899bb">🇹🇷 ' + expTr + '</em>';
    if (state.revealData.winnerName) html += '<br><strong style="color:var(--green)">Winner: ' + state.revealData.winnerName + '</strong>';
    if (!state.revealData.isCorrect) html += '<br><span style="color:var(--red)">No one got it right</span>';
    expEl.innerHTML = html;
    expEl.classList.remove('hide');
  } else {
    expEl.classList.add('hide');
  }
}

function renderBuzzOrder(totalTeams, buzzedCount) {
  const el = document.getElementById('buzzList');
  const counter = document.getElementById('buzzCounter');
  if (!state.buzzOrder || state.buzzOrder.length === 0) {
    el.innerHTML = '<div style="color:var(--dim);font-size:.85em;padding:8px">' +
      (state.phase === 'buzzing' ? 'Waiting for buzzes...' : state.phase === 'all-wrong' ? 'All teams got it wrong' : 'No buzzes yet') + '</div>';
    counter.classList.add('hide');
    return;
  }
  if (totalTeams) {
    counter.classList.remove('hide');
    counter.textContent = buzzedCount + ' / ' + totalTeams + ' teams buzzed';
  }
  el.innerHTML = state.buzzOrder.map((b, i) => {
    const rankClass = i === 0 ? 'r1' : i === 1 ? 'r2' : i === 2 ? 'r3' : '';
    return `<div class="buzz-item ${i === 0 ? 'first' : ''}">
      <span class="buzz-rank ${rankClass}">#${i+1}</span>
      <span class="buzz-color" style="background:${b.color || '#666'}"></span>
      <span class="buzz-name">${b.name}</span>
      <span class="buzz-time">${b.ms}ms</span>
    </div>`;
  }).join('');
}

function renderLeaderboard() {
  const el = document.getElementById('leaderboard');
  if (!state.teams || state.teams.length === 0) {
    el.innerHTML = '<div style="color:var(--dim);font-size:.85em;padding:8px">No teams yet...</div>';
    return;
  }
  const sorted = [...state.teams].sort((a,b) => b.score - a.score);
  el.innerHTML = sorted.map((t, i) => {
    const pc = i === 0 ? 'p1' : i === 1 ? 'p2' : i === 2 ? 'p3' : '';
    return `<div class="lb-entry">
      <span class="lb-pos ${pc}">${i+1}</span>
      <span class="lb-color" style="background:${t.color}"></span>
      <span class="lb-name">${t.name}</span>
      <span class="lb-score">${t.score}</span>
      <span class="lb-connected ${t.connected ? 'online' : 'offline'}"></span>
    </div>`;
  }).join('');
}

function renderControls() {
  const area = document.getElementById('controlsArea');
  const resetBtn = '<button class="btn btn-reset" onclick="if(confirm(\'Reset? All scores lost.\')){resetGame()}">RESET</button>';
  switch(state.phase) {
    case 'lobby':
      area.innerHTML = '<button class="btn btn-start" onclick="startGame()" style="flex:1">START GAME</button>';
      break;
    case 'buzzing':
      area.innerHTML = '<button class="btn btn-skip" onclick="skip()">SKIP QUESTION</button>' + resetBtn;
      break;
    case 'answering':
      area.innerHTML = `<button class="btn btn-correct" onclick="markCorrect()" style="flex:1">CORRECT</button>
        <button class="btn btn-wrong" onclick="markWrong()" style="flex:1">WRONG</button>
        <button class="btn btn-skip" onclick="skip()">SKIP</button>` + resetBtn;
      break;
    case 'all-wrong':
      area.innerHTML = '<div style="color:var(--red);font-weight:700;padding:8px;text-align:center">All teams answered wrong!</div><button class="btn btn-skip" onclick="skip()" style="flex:1">REVEAL ANSWER</button>' + resetBtn;
      break;
    case 'reveal': {
      const isLast = state.currentQuestion && state.currentQuestion.num >= state.currentQuestion.total;
      area.innerHTML = (isLast
        ? '<button class="btn btn-next" style="flex:1" disabled>LAST QUESTION</button>'
        : '<button class="btn btn-next" onclick="nextQ()" style="flex:1">NEXT QUESTION</button>') + resetBtn;
      break;
    }
    case 'finished':
      area.innerHTML = '<button class="btn btn-reset" onclick="resetGame()" style="flex:1">NEW GAME</button>';
      break;
    default: area.innerHTML = '';
  }
}

function renderFinished() {
  if (state.phase !== 'finished') return;
  const sorted = [...state.teams].sort((a,b) => b.score - a.score);
  const trophies = ['🏆','🥈','🥉'], classes = ['first','second','third'];
  document.getElementById('podium').innerHTML = [1, 0, 2].map(idx => {
    const t = sorted[idx];
    if (!t) return '';
    return `<div class="podium-spot ${classes[idx]}"><div class="podium-trophy">${trophies[idx]}</div><div class="podium-name">${t.name}</div><div class="podium-score">${t.score} pts</div></div>`;
  }).join('');
}

function startGame() { ws.send(JSON.stringify({ type: 'start-game' })); }
function nextQ() { ws.send(JSON.stringify({ type: 'next-question' })); }
function markCorrect() { ws.send(JSON.stringify({ type: 'mark-correct' })); }
function markWrong() { ws.send(JSON.stringify({ type: 'mark-wrong' })); }
function skip() { ws.send(JSON.stringify({ type: 'skip' })); }
function resetGame() { ws.send(JSON.stringify({ type: 'reset' })); }
function setLang(lang) { ws.send(JSON.stringify({ type: 'set-lang', lang })); }

function showCountdown(sec) {
  const ov = document.getElementById('countdownOverlay'), num = document.getElementById('countdownNum');
  ov.classList.remove('hide');
  let c = sec; num.textContent = c;
  const iv = setInterval(() => {
    if (--c <= 0) { clearInterval(iv); ov.classList.add('hide'); }
    else { num.textContent = c; num.style.animation = 'none'; void num.offsetHeight; num.style.animation = 'countPop .8s ease'; }
  }, 1000);
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  switch(e.key) {
    case 'c': case 'C': if (state.phase === 'answering') markCorrect(); break;
    case 'w': case 'W': if (state.phase === 'answering') markWrong(); break;
    case 's': case 'S': if (['buzzing','answering','all-wrong'].includes(state.phase)) skip(); break;
    case 'n': case 'N': case ' ': if (state.phase === 'reveal') nextQ(); break;
    case 'Enter': if (state.phase === 'lobby') startGame(); break;
  }
});

connect();
</script>
</body>
</html>
